<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- script src="{{ url_for('static', filename='main.js') }}"></!-- -->
    <title>Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="container-fluid maindiv">

        <h1>Loan Payments</h1>
        <div id="tablediv">
            <table class="table table-striped table-hover table-responsive">
                <thead>
                    <tr>
                        {% for col in column_names %}
                        <th>{{ col }}</th>
                        {% endfor %}
                    </tr>
                </thead>
                <tbody>
                    {% for rows in row_data %}
                    <tr>
                        {% for col, row in zip(column_names, rows) %}
                        <td> {{ row }} </td>
                        {% endfor %}
                    </tr>
                    {% endfor %}
                    <tr id="addpaymentrow1" class="btn-primary">
                        <td id="addpaymentrow2" colspan="5" data-bs-toggle="modal" data-bs-target="#addPayment">Add Payment</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <!-- Modal -->
    <div class="modal fade" id="addPayment" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalLabel">Add Payment</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form action="{{ url_for('main')}}" method="POST">
                    <div class="modalselectors">
                        <label>Payment Date: </label>
                        <input name='date' type="date" />
                    </div>
                    <div class="input-group mb-3 modalselectors">
                        <label>Payment Amount:</label>
                        <div class="modalinputgroup">
                            <span class="input-group-text">$</span>
                            <input name= 'amount' type="text" class="form-control" aria-label="Payment Amount">
                            <span class="input-group-text">.00</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary" data-bs-dismiss="modal">Save Payment</button>
                </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
